<!DOCTYPE html>
<html>
<head>
  <title>Secure Access</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="brand">
  <h1 class="main-title">KAMAL'S WORLD</h1>
  <p class="sub-title">Cyber With Kamal</p>
</div>

<div class="login-box">

  <h2>🔐 Secure Access</h2>

  <form onsubmit="goToHome(event)">

    <input type="text" placeholder="Full Name" required />

    <input type="tel" placeholder="+91 Mobile Number" required />

    <button class="login-btn">Continue</button>

  </form>

  <p style="color:red; font-size:12px;">
  
  </p>

</div>

<script>
function goToHome(e) {
  e.preventDefault();
  const name = document.querySelector("input[type='text']").value;
const mobile = document.querySelector("input[type='tel']").value;

localStorage.setItem("userName", name);
localStorage.setItem("userMobile", mobile);
  window.location.href = "home.html";
}
</script>

</body>
</html>
